services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-test-gen-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./generated_tests:/app/generated_tests
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-30000}
    container_name: ai-test-gen-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
