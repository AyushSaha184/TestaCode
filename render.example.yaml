services:
  - type: web
    name: ai-test-gen-backend
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: LOG_TO_FILE
        value: false

      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app

      - key: VERCEL_FRONTEND_URL
        value: https://your-frontend-domain.vercel.app

      - key: SUPABASE_DB_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SUPABASE_STORAGE_BUCKET
        value: code-files

      - key: SUPABASE_STORAGE_PUBLIC
        value: false

      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: 3600

      - key: USE_REDIS_CACHE
        value: false

      - key: REDIS_URL
        sync: false

      - key: REDIS_KEY_PREFIX
        value: testacode

      - key: LLM_ENABLED
        value: false

      - key: LLM_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      - key: GOOGLE_API_KEY
        sync: false

      - key: LLM_FAST_MODEL
        value: gpt-4o-mini

      - key: LLM_STRONG_MODEL
        value: gpt-4.1

      - key: AUTO_COMMIT_DEFAULT
        value: false

      - key: ENABLE_GIT_PUSH
        value: false

      - key: GIT_AUTHOR_NAME
        value: ai-test-gen-bot

      - key: GIT_AUTHOR_EMAIL
        value: ai-test-gen-bot@example.com

      - key: GENERATED_TESTS_DIR
        value: generated_tests

      - key: REPOSITORY_ROOT
        value: .
