name: generated-tests-ci

on:
  push:
    branches: ["main"]
    paths:
      - "generated_tests/**"
      - "backend/**"
      - "requirements.txt"
      - ".github/workflows/generated-tests-ci.yml"
  pull_request:
    paths:
      - "generated_tests/**"
      - "backend/**"
      - "requirements.txt"
      - ".github/workflows/generated-tests-ci.yml"

jobs:
  generated-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-json-report

      - name: Run generated tests if present
        id: generated_tests
        continue-on-error: true
        run: |
          if [ -d "generated_tests" ]; then
            pytest generated_tests -q --maxfail=1 --cov=. --cov-report=term --cov-report=xml --json-report --json-report-file=generated-test-summary.json
          else
            echo "generated_tests directory not found, running baseline tests"
            pytest tests -q --cov=. --cov-report=term --cov-report=xml --json-report --json-report-file=generated-test-summary.json
          fi

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-test-summary
          path: generated-test-summary.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Emit run metadata
        run: |
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "status=${{ job.status }}" >> $GITHUB_OUTPUT
